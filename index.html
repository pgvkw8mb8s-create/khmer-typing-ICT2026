function lsGet(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}

/* ================= SOUND ================= */
let audioCtx=null;
function ac(){if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended")audioCtx.resume();return audioCtx;}
function tone(f,dur,type,vol,delay){
  if(!S.soundOn)return;
  try{const a=ac(),t0=a.currentTime+(delay||0),o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.value=f;
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(vol,t0+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g);g.connect(a.destination);o.start(t0);o.stop(t0+dur+0.05);}catch(e){}
}

/* ================= RENDER HELPERS ================= */
function bi(kh,jp,khSize,color){
  return `<div style="text-align:center;line-height:1.35">
    <div class="kh" style="font-size:${khSize||18}px;font-weight:700;color:${color||"var(--ink)"}">${kh}</div>
    <div class="sub">${jp}</div></div>`;
}
function keyboardHTML(compact){
  const w=compact?44:52;
  let html='<div style="display:flex;flex-direction:column;gap:6px;align-items:center">';
  KEY_ROWS.forEach((row,ri)=>{
    html+=`<div class="kbrow" style="margin-left:${ri===2?w*0.3:ri===3?0:0}px">`;
    if(ri===3)html+=`<div class="key" id="k-shift" style="width:${w*1.4}px;height:${w}px;border-color:#C9B486"><div class="lat" style="font-size:12px">⇧ Shift</div></div>`;
    row.forEach(([la,b,s])=>{
      const f=FINGERS[FINGER_MAP[la]]||FINGERS.rp;
      const kid="k-"+(la==="'"?"ap":la);
      html+=`<div class="key" id="${kid}" data-base="${esc(b)}" data-shift="${esc(s||"")}" data-color="${f.color}"
        style="width:${w}px;height:${w}px;border-color:${f.color}">
        ${s?`<div class="shf">${esc(s)}</div>`:""}
        <div class="main">${esc(b)}</div>
        <div class="lat">${la==="'"?"'":la.toUpperCase()}</div>
        ${HOME_KEYS.includes(la)?`<div class="home" style="background:${f.color}"></div>`:""}</div>`;
    });
    html+="</div>";
  });
  html+=`<div class="key" style="width:${w*6}px;height:${compact?26:32}px;border-color:#C9B486"><div class="lat">Space</div></div></div>`;
  return html;
}
function legendHTML(){
  return '<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">'+
    Object.values(FINGERS).map(f=>`<div class="legend" style="border-color:${f.color}">
      <div style="width:12px;height:12px;border-radius:999px;background:${f.color}"></div>
      <span class="kh" style="font-size:12px;font-weight:700">${f.kh}</span>
      <span class="sub" style="font-size:11px">${f.jp}</span></div>`).join("")+"</div>";
}
function rankRows(rows,myId){
  return rows.map((r,i)=>`<div class="rankrow${r.id===myId?" me":""}">
    <span>${["🥇","🥈","🥉"][i]||`${i+1}.`} ${r.tag}${r.id===myId?" ←あなた":""}</span>
    <span style="color:var(--blue)">Lv.${r.level}${r.bonus?` +${r.bonus}`:""} <span class="sub" style="font-size:12px">(${r.keys}打 / ${r.acc}%)</span></span>
  </div>`).join("");
}
const sortRows=rows=>rows.slice().sort((a,b)=>(b.level+b.bonus)-(a.level+a.bonus)||b.keys-a.keys);

function startGame(){
  ac&&SND.correct&&ac(); /* unlock audio */
  S.level=S.startLevel;S.bonus=0;S.correct=0;S.err=0;S.cleared=0;
  S.timeLeft=S.minutes*60;
  loadLevel(S.startLevel,null);
  show("game");
  clearInterval(S.timerId);
  S.timerId=setInterval(tick,1000);
}
window.startGame=startGame;
function tick(){
  if(S.screen!=="game"){clearInterval(S.timerId);return;}
  S.timeLeft--;
  if(S.timeLeft<=0){finishGame();return;}
  updateTimer();
}
function finishGame(){
  clearInterval(S.timerId);
  SND.finish();confetti();
  saveResult();
  show("result");
}

  const t=$("timer");if(!t)return;
  const mm=Math.floor(S.timeLeft/60),ss=String(S.timeLeft%60).padStart(2,"0");
  t.textContent=`⏱ ${mm}:${ss}`;
  if(S.timeLeft<=10){t.style.background="var(--red)";t.style.color="#fff";}
}
function updateGame(){
  updateTimer();
  const total=S.correct+S.err,acc=total?Math.round(S.correct/total*100):100;
  const st=$("stats");if(st)st.textContent=`🕐${S.group} ✅ ${S.cleared} 🎯 ${acc}%`;
  const chars=[...S.target];
  const dots=$("dots");
  if(dots)[...dots.children].forEach((d,i)=>{d.className="dot"+(i<S.pos?" done":i===S.pos?" cur":"");});
  const bar=$("bar");if(bar)bar.style.width=(chars.length?Math.min(S.pos/chars.length,1)*100:0)+"%";
  /* next key */
  const nc=chars[S.pos];
  const info=nc?KEYINFO[nc]:null;
  if(prevKeyEl){prevKeyEl.classList.remove("next");prevKeyEl.style.background="#FFFDF5";
    const m=prevKeyEl.querySelector(".main");if(m&&prevKeyEl.dataset.base)m.textContent=prevKeyEl.dataset.base;prevKeyEl=null;}
  const shiftEl=$("k-shift");
  if(shiftEl){shiftEl.classList.remove("next");shiftEl.style.background="#FFFDF5";
    shiftEl.querySelector(".lat").style.color="#A08A62";}
  const hint=$("hint");
  if(info){
    const f=FINGERS[FINGER_MAP[info.latin]]||FINGERS.rp;
    const kid="k-"+(info.latin==="'"?"ap":info.latin);
    const ke=$(kid);
    if(ke){ke.classList.add("next");ke.style.background=f.color;
      const m=ke.querySelector(".main");if(m&&info.shift&&ke.dataset.shift)m.textContent=ke.dataset.shift;
      prevKeyEl=ke;}
    if(info.shift&&shiftEl){shiftEl.classList.add("next");shiftEl.style.background="var(--red)";
      shiftEl.querySelector(".lat").style.color="#fff";}
    if(hint)hint.innerHTML=`<div style="display:flex;align-items:center;gap:14px;background:#fff;border-radius:999px;padding:8px 20px;border:3px solid ${f.color}">
      <div style="width:52px;height:52px;border-radius:14px;background:${f.color};color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <span class="kh" style="font-size:24px;font-weight:900;line-height:1">${esc(nc)}</span>
        <span style="font-size:10px;font-weight:800">${info.shift?"⇧+":""}${info.latin==="'"?"'":info.latin.toUpperCase()}</span></div>
      <div><div class="kh" style="font-size:15px;font-weight:700">ចុចដោយ ${f.kh}${info.shift?" (ចុច Shift ជាមួយ)":""}</div>
      <div class="sub">${f.jp}でおす${info.shift?"(Shiftをおしながら)":""}</div></div></div>`;
  }else if(hint)hint.innerHTML="";
}
function handleInput(typed){
  if(S.screen!=="game"||!typed)return;
  const arr=[...S.target];
  if(S.pos>=arr.length)return;
  const tArr=[...typed];
  const want=arr.slice(S.pos,S.pos+tArr.length).join("");
  if(typed===want){
    SND.correct();
    S.correct+=tArr.length;
    S.pos+=tArr.length;
    if(S.pos>=arr.length){
      SND.levelUp();confetti();S.cleared++;
      const p=PRAISE[Math.floor(Math.random()*PRAISE.length)];
      const atTop=S.level>=10;
      const nextLbl=atTop?`Lv.10 +${S.bonus+1}`:`Lv.${S.level+1}`;
      showOverlay(`<div style="font-size:44px">🪷🎉🇰🇭</div>
        <div class="kh" style="font-size:46px;font-weight:900;color:var(--red);text-shadow:2px 2px 0 #fff">${p[0]}</div>
        <div style="font-size:18px;font-weight:800;color:var(--blueD)">${p[1]}</div>
        <div class="kh" style="font-size:16px;font-weight:700;margin-top:4px">→ ${nextLbl}!</div>`,950);
      setTimeout(()=>{
        if(S.screen!=="game")return;
        if(atTop)S.bonus++;else S.level++;
        loadLevel(S.level,S.target);
        render();
      },950);
    }else updateGame();
  }else{
    SND.wrong();S.err++;
    const tc=$("targetcard");
    if(tc){tc.classList.remove("shakebox");void tc.offsetWidth;tc.classList.add("shakebox");}
    updateGame();
  }
}
window.addEventListener("keydown",e=>{
  if(S.screen!=="game")return;
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(e.key==="Shift"||e.key==="CapsLock"||e.key==="Tab")return;
  e.preventDefault();
  const k=e.key;let typed=k;
  if(/^[a-z0-9']$/.test(k))typed=BASE2KH[k]||k;
  else if(/^[A-Z]$/.test(k))typed=SHIFT2KH[k.toLowerCase()]||k;
  else if(k==='"')typed=SHIFT2KH["'"]||k;
  handleInput(typed);
});

/* ---- RESULT ---- */
function saveResult(){
  const total=S.correct+S.err,acc=total?Math.round(S.correct/total*100):100;
  const seq=S.board.filter(r=>r.group===S.group).length+1;
  S.myTag=`${ANIMALS[(seq-1)%ANIMALS.length]} No.${seq}`;
  S.myId=Date.now();
  S.board.push({id:S.myId,group:S.group,tag:S.myTag,level:S.level,bonus:S.bonus,keys:S.correct,acc});
  lsSet("kt-board",S.board);
}
function resultHTML(){
  const total=S.correct+S.err,acc=total?Math.round(S.correct/total*100):100;
  const score=S.level+S.bonus;
  const stars=score>=12?5:score>=10?4:score>=7?3:score>=4?2:1;
  const msg=stars>=5?["អ្នកគឺជាជើងឯកពិតប្រាកដ!","きみは本物のチャンピオン!"]:
   stars===4?["អ្នកបានបញ្ចប់ទាំង ១០ កម្រិត!","全10レベル制覇!すごい!"]:
   stars===3?["ពូកែណាស់! បន្តទៀត!","すごくじょうず!この調子!"]:
   stars===2?["ល្អណាស់! អ្នកកំពុងរីកចម្រើន!","いいね!どんどん成長してる!"]:
   ["ការចាប់ផ្ដើមដ៏អស្ចារ្យ!","すばらしい第一歩!"];
  const lvl=S.bonus>0?`Lv.10 +${S.bonus}`:`Lv.${S.level}`;
  const rows=sortRows(S.board.filter(r=>r.group===S.group));
  const stat=(e,v,kh,jp)=>`<div style="background:var(--cream);border-radius:16px;padding:10px 16px;border:2px solid var(--gold)">
    <div style="font-size:20px">${e}</div><div style="font-size:22px;font-weight:800;color:var(--blueD)">${v}</div>
    <div class="kh" style="font-size:11px">${kh}</div><div class="sub" style="font-size:10px">${jp}</div></div>`;
  return `<div class="card" style="text-align:center;border-width:5px;margin-top:24px">
    <div style="font-size:54px">🏆</div>
    <div style="font-size:30px">${"⭐".repeat(stars)}${"☆".repeat(5-stars)}</div>
    <div style="font-size:14px;font-weight:800;color:var(--blueD)">ក្រុមម៉ោង ${S.group} ・ グループ「${S.group}」
      <span style="background:#FFF3C4;border-radius:999px;padding:2px 10px;margin-left:4px">${S.myTag||""}</span></div>
    ${bi("អ្នកបានដល់","きみの記録",18)}
    <div class="kh" style="font-size:58px;font-weight:900;color:var(--red);line-height:1.1">${lvl}</div>
    <div class="sub" style="font-size:13px">とうたつレベル / កម្រិតដែលបានទៅដល់</div>
    <div style="display:flex;justify-content:center;gap:18px;margin-top:14px;flex-wrap:wrap">
      ${stat("✅",S.cleared,"កម្រិតបានឆ្លង","レベルクリア数")}
      ${stat("⌨️",S.correct,"ចុចត្រូវ","正しく打った数")}
      ${stat("🎯",acc+"%","ភាពត្រឹមត្រូវ","正確さ")}</div>
    <div style="margin-top:14px">${bi(msg[0],msg[1],20,"var(--jade)")}</div>
    ${S.reason?`<div class="kh" style="margin-top:12px;background:#E7F8F0;border-radius:14px;padding:10px 14px;font-size:13px">
      💪 មូលហេតុរបស់អ្នក៖ ${esc(S.reason)}<br>
      <span class="sub" style="font-family:var(--jp);font-size:11px">今日の練習は、この理由に一歩近づいたよ。</span></div>`:""}
    <div style="display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap">
      <button class="bigbtn bb-red" style="width:auto" onclick="startGame()">
        <div class="t1" style="font-size:18px">លេងម្ដងទៀត! 🔁</div><div class="t2">もういちど!</div></button>
      <button class="bigbtn bb-blue" style="width:auto" onclick="show('home')">
        <div class="t1" style="font-size:16px">ទំព័រដើម 🏠</div><div class="t2">ホームへ</div></button></div>
  </div>
  ${rows.length?`<div class="card blue">
    ${bi(`🏆 ចំណាត់ថ្នាក់ក្រុមម៉ោង ${S.group}`,`グループ「${S.group}」のランキング(このPC・制限時間はみんな${S.minutes}分)`,18)}
    ${rankRows(rows,S.myId)}</div>`:""}`;
}

render();
</script>
</body>
